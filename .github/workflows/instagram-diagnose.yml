name: Instagram API Diagnose

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Діагностика Instagram API — me/accounts
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          echo "=== /me/accounts з instagram_business_account ==="
          RESPONSE=$(curl -s "https://graph.facebook.com/v19.0/me/accounts?fields=name,id,instagram_business_account{id,username}&access_token=$IG_ACCESS_TOKEN")
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -m json.tool || true

          echo ""
          echo "=== Прямий запит до Page IDs з токена ==="
          # Page IDs з granular_scopes попереднього запиту
          for PAGE_ID in 1135592312964384 1115612691630367 1109487505571319 1095963640263286 1064105853456868 1059568480573429; do
            echo "--- Page $PAGE_ID ---"
            curl -s "https://graph.facebook.com/v19.0/$PAGE_ID?fields=name,instagram_business_account{id,username}&access_token=$IG_ACCESS_TOKEN" | python3 -m json.tool || true
            echo ""
          done

          echo ""
          echo "=== Інформація про токен ==="
          DEBUG=$(curl -s "https://graph.facebook.com/debug_token?input_token=$IG_ACCESS_TOKEN&access_token=$IG_ACCESS_TOKEN")
          echo "$DEBUG"
          echo "$DEBUG" | python3 -m json.tool || true
