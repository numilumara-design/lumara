name: Instagram API Diagnose

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Діагностика Instagram API
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          echo "=== /me/accounts ==="
          curl -s "https://graph.facebook.com/v19.0/me/accounts?access_token=$IG_ACCESS_TOKEN" | python3 -m json.tool

          echo ""
          echo "=== /me/accounts with instagram_business_account ==="
          curl -s "https://graph.facebook.com/v19.0/me/accounts?fields=name,id,instagram_business_account&access_token=$IG_ACCESS_TOKEN" | python3 -m json.tool

          echo ""
          echo "=== Token debug ==="
          curl -s "https://graph.facebook.com/debug_token?input_token=$IG_ACCESS_TOKEN&access_token=$IG_ACCESS_TOKEN" | python3 -m json.tool
