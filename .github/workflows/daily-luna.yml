name: LUNA — Щоденний астрологічний пост

on:
  # Запуск щодня о 07:00 UTC = 09:00 Київ (UTC+2)
  schedule:
    - cron: '0 7 * * *'

  # Ручний запуск для тестування
  workflow_dispatch:

jobs:
  publish-daily-post:
    name: Публікація щоденного прогнозу LUNA
    runs-on: ubuntu-latest

    steps:
      - name: Клонувати репозиторій
        uses: actions/checkout@v4

      - name: Встановити Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/agents/luna/scripts/requirements.txt

      - name: Встановити Python залежності
        run: |
          pip install -r packages/agents/luna/scripts/requirements.txt

      - name: Запустити Telegram бота LUNA
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          # Другий Telegram канал (опційно — якщо не вказано, пропускається)
          TELEGRAM_CHANNEL_ID_2: ${{ secrets.TELEGRAM_CHANNEL_ID_2 }}
          # Google Drive для збереження Instagram контенту
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          python packages/agents/luna/scripts/telegram_bot.py
