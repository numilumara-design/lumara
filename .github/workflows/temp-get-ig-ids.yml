name: Get Instagram Business Account IDs

on:
  workflow_dispatch:

jobs:
  get-ig-ids:
    runs-on: ubuntu-latest
    steps:
      - name: Get IG IDs via Graph API
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          RESPONSE=$(curl -s "https://graph.facebook.com/v22.0/me/accounts?fields=name,instagram_business_account{username,id}&access_token=${IG_ACCESS_TOKEN}")
          echo "$RESPONSE" | jq .
          echo "$RESPONSE" | jq -r '.data[] | "Page: \(.name) | IG ID: \(.instagram_business_account.id // "not connected")"'
