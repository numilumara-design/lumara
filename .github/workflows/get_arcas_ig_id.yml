name: Get ARCAS IG User ID (one-time)
on:
  workflow_dispatch:
jobs:
  get-id:
    runs-on: ubuntu-latest
    steps:
      - name: Query ARCAS Instagram Business Account ID
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          echo "Querying ARCAS page for instagram_business_account..."
          curl -s "https://graph.facebook.com/v19.0/1059568480573429?fields=instagram_business_account,connected_instagram_account&access_token=$IG_ACCESS_TOKEN"
